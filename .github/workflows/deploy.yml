name: Deploy DAGs to Airflow

on:
  push:
    branches:
      - main  # Triggered whenever you push to the main branch
    paths:
      - 'dags/**' # Only trigger if files in the dags folder change

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via rsync
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ARGS: "-rlgoDzvc -i --delete" # Syncs files and deletes removed ones
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          TARGET: ${{ secrets.TARGET_DIR }}
          SOURCE: "dags/" # This points to the dags folder in your repo
